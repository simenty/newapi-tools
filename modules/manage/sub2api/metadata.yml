# metadata.yml — Sub2API 插件元数据
# 位置：modules/manage/sub2api/metadata.yml

# ===== 必填字段 =====
name: "sub2api"
display_name: "Sub2API"
version: "2.4.0"
description: "Sub2API 订阅转换网关管理插件"
author: "newapi-tools-team"
min_toolkit_version: "2.4.0"

# 网关运行时配置
gateway:
  container_name: "sub2api"
  image: "weishaw/sub2api:latest"
  port: 8080
  health_check_path: "/"
  network_name: "sub2api-network"

# 依赖服务
dependencies:
  npm:
    required: false
    container_name: "npm"
    image: "jc21/nginx-proxy-manager:latest"
    note: "可选，Sub2API 可独立运行"

# 数据目录
data_dirs:
  - "data"

# 备份配置
backup:
  has_database: false
  database_type: "none"

# ===== 可选字段 =====
homepage: "https://github.com/weishaw/sub2api"
license: "MIT"
tags:
  - "ai-gateway"
  - "subscription"

# 插件注册的命令
commands:
  - name: "sub2api-backup"
    script: "backup.sh"
    desc: "备份 Sub2API 数据"
    help: "备份 Sub2API 核心数据"
  - name: "sub2api-restore"
    script: "restore.sh"
    desc: "恢复 Sub2API 数据"
    help: "从备份恢复 Sub2API 数据"
  - name: "sub2api-config"
    script: "config.sh"
    desc: "Sub2API 配置"
    help: "交互式配置 Sub2API 参数"

# 插件注册的钩子
hooks:
  - name: "health_check"
    function: "sub2api_health_check"
    priority: 30

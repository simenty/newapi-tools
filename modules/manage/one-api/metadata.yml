# metadata.yml — One API 插件元数据
# 位置：modules/manage/one-api/metadata.yml

# ===== 必填字段 =====
name: "one-api"
display_name: "One API"
version: "2.4.0"
description: "One API AI 网关管理插件"
author: "newapi-tools-team"
min_toolkit_version: "2.4.0"

# 网关运行时配置
gateway:
  container_name: "one-api"
  image: "justsong/one-api:latest"
  port: 3000
  health_check_path: "/api/status"
  network_name: "oneapi-network"

# 依赖服务
dependencies:
  redis:
    required: true
    container_name: "redis"
    image: "redis:7.2"
  mysql:
    required: false
    container_name: "mysql"
    image: "mysql:8.0"
    note: "可选，One API 默认使用 SQLite"
  npm:
    required: true
    container_name: "npm"
    image: "jc21/nginx-proxy-manager:latest"

# 数据目录
data_dirs:
  - "data"
  - "npm"

# 备份配置
backup:
  has_database: true
  database_type: "sqlite"
  database_name: "one-api.db"
  database_container: ""

# ===== 可选字段 =====
homepage: "https://github.com/songquanpeng/one-api"
license: "MIT"
tags:
  - "ai-gateway"
  - "openai-compatible"

# 插件注册的命令
commands:
  - name: "one-api-backup"
    script: "backup.sh"
    desc: "备份 One API 数据"
    help: "备份 One API SQLite 数据库与核心数据"
  - name: "one-api-restore"
    script: "restore.sh"
    desc: "恢复 One API 数据"
    help: "从备份恢复 One API 数据"
  - name: "one-api-update"
    script: "update.sh"
    desc: "更新 One API 镜像"
    help: "拉取最新镜像并更新 One API"
  - name: "one-api-config"
    script: "config.sh"
    desc: "One API 配置"
    help: "交互式配置 One API 参数"

# 插件注册的钩子
hooks:
  - name: "post_install"
    function: "oneapi_post_install"
    priority: 10
  - name: "health_check"
    function: "oneapi_health_check"
    priority: 20

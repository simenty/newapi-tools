# NewAPI Tools - goreleaser v2 configuration
# https://goreleaser.com/customization/

version: 2

project_name: newapi-tools

before:
  hooks: []

builds:
  - id: newapi
    main: ./cmd/newapi/
    binary: newapi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/simenty/newapi-tools/internal/core.Version={{.Version}}
      - -X github.com/simenty/newapi-tools/internal/core.GitCommit={{.ShortCommit}}
      - -X github.com/simenty/newapi-tools/internal/core.BuildDate={{.Date}}
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - configs/newapi-tools.yml

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "merge conflict"
      - "revert"

release:
  github:
    owner: simenty
    name: newapi-tools
  draft: false
  prerelease: auto

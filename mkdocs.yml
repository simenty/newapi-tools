site_name: NewAPI Tools
site_description: Docker management platform for new-api
site_url: https://simenty.github.io/newapi-tools/
repo_url: https://github.com/simenty/newapi-tools
repo_name: simenty/newapi-tools
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - attr_list

nav:
  - 首页: index.md
  - 快速开始: guide/getting-started.md
  - 命令参考:
    - install: commands/install.md
    - status: commands/status.md
    - audit: commands/audit.md
    - backup: commands/backup.md
    - restore: commands/restore.md
    - update: commands/update.md
    - doctor: commands/doctor.md
    - config: commands/config.md
    - instance: commands/instance.md
    - mirror: commands/mirror.md
    - version: commands/version.md
  - 镜像加速: guide/mirror.md
  - 常见问题: guide/faq.md

plugins:
  - search
  - redirects:
      redirect_maps: {}

exclude_docs: |

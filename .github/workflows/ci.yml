name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.23']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Go mod download
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with Coverage
        run: go test ./... -count=1 -timeout 120s -coverprofile=coverage.out

      - name: Coverage Gate (>= 30%)
        if: matrix.os != 'windows-latest'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 30" | bc -l) )); then
            echo "Coverage too low: ${COVERAGE}% < 30%"
            exit 1
          fi
          echo "Coverage check passed!"

      - name: Coverage Gate - Windows
        if: matrix.os == 'windows-latest'
        run: |
          $totalPct = 0
          $count = 0
          go test ./... -count=1 -timeout 120s -cover 2>&1 | ForEach-Object {
            if ($_ -match 'coverage:\s+([\d.]+)%') {
              $totalPct += [double]$Matches[1]
              $count++
            }
          }
          if ($count -eq 0) {
            Write-Host "ERROR: Could not parse any coverage data"
            exit 1
          }
          $coverage = [math]::Round($totalPct / $count, 1)
          Write-Host "Coverage: ${coverage}%"
          if ($coverage -lt 30) {
            Write-Host "ERROR: Coverage too low: ${coverage}% < 30%"
            exit 1
          }
          Write-Host "Coverage check passed!"

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Build
        run: go build ./cmd/newapi/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m ./...

  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Regenerate error code docs
        run: go run cmd/gendocs/main.go > docs/errors.md

      - name: Check docs/errors.md is up to date
        run: |
          if [ -n "$(git status --porcelain docs/errors.md)" ]; then
            echo "ERROR: docs/errors.md is out of date!"
            echo "Run 'go run cmd/gendocs/main.go > docs/errors.md' and commit the changes."
            git diff docs/errors.md
            exit 1
          fi
          echo "docs/errors.md is up to date."
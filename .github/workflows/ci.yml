name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.23']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Go mod download
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with Coverage
        run: go test ./... -count=1 -timeout 120s -coverprofile=coverage.out

      - name: Coverage Gate (>= 20%)
        if: matrix.os != 'windows-latest'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 20" | bc -l) )); then
            echo "Coverage too low: ${COVERAGE}% < 20%"
            exit 1
          fi
          echo "Coverage check passed!"

      - name: Coverage Gate - Windows
        if: matrix.os == 'windows-latest'
        run: |
          $totalStatements = 0
          $coveredStatements = 0
          Get-Content coverage.out | Select-Object -Skip 1 | ForEach-Object {
            $parts = $_ -split '\s+'
            if ($parts.Count -ge 3) {
              $numStatements = [int]$parts[1]
              $execCount = [int]$parts[2]
              $totalStatements += $numStatements
              if ($execCount -gt 0) {
                $coveredStatements += $numStatements
              }
            }
          }
          $coverage = [math]::Round(($coveredStatements / $totalStatements) * 100, 1)
          Write-Host "Coverage: ${coverage}%"
          if ($coverage -lt 20) {
            Write-Host "Coverage too low: ${coverage}% < 20%"
            exit 1
          }
          Write-Host "Coverage check passed!"

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Build
        run: go build ./cmd/newapi/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m ./...

  release-snapshot:
    name: Release Snapshot
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.23']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Go mod download
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with Coverage
        run: go test ./... -count=1 -timeout 120s -coverprofile=coverage.out

      - name: Coverage Gate (>= 40%)
        if: matrix.os != 'windows-latest'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 40" | bc -l) )); then
            echo "Coverage too low: ${COVERAGE}% < 40%"
            exit 1
          fi
          echo "Coverage check passed!"

      - name: Coverage Gate - Windows
        if: matrix.os == 'windows-latest'
        run: |
          $coverage = (go tool cover -func=coverage.out | Select-String "total" | ForEach-Object { $_ -replace '.*total\s+\d+\.\d+\s+(\d+\.\d+)%.*', '$1' })
          Write-Host "Coverage: ${coverage}%"
          $coverageValue = [double]$coverage
          if ($coverageValue -lt 40) {
            Write-Host "Coverage too low: ${coverage}% < 40%"
            exit 1
          }
          Write-Host "Coverage check passed!"

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Build
        run: go build ./cmd/newapi/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  release-snapshot:
    name: Release Snapshot
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

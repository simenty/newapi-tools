name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0.0, v2.1.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for goreleaser

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run Tests
        run: go test ./... -count=1 -timeout 120s

      - name: Run Tests with Coverage
        run: go test ./... -count=1 -timeout 120s -coverprofile=coverage.out

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Run GoReleaser
        run: |
          GORELEASER_VERSION=v2.14.1
          curl -sL "https://github.com/goreleaser/goreleaser/releases/download/$GORELEASER_VERSION/goreleaser_$(uname -s)_x86_64.tar.gz" -o goreleaser.tar.gz
          tar -xzf goreleaser.tar.gz goreleaser
          ./goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

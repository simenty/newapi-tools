name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0.0, v2.1.3, etc.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for goreleaser

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Tests
        run: go test ./... -count=1 -timeout 120s

      - name: Run Tests with Coverage
        run: go test ./... -count=1 -timeout 120s -coverprofile=coverage.out

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: coverage.out
          fail_ci_if_error: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-helm:
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Package Helm Chart
        run: |
          helm package ./charts/newapi-tools

      - name: Update Helm Chart Index
        run: |
          # Create gh-pages branch if it doesn't exist
          git fetch origin gh-pages:gh-pages || git checkout --orphan gh-pages
          git rm -rf .
          mkdir -p .cr-release-packages
          mv *.tgz .cr-release-packages/ || true
          helm repo index .cr-release-packages --url https://${{ github.repository_owner }}.github.io/newapi-tools
          mv .cr-release-packages/index.yaml ./index.yaml
          rm -rf .cr-release-packages
          git add -A
          git commit -m "Release ${{ github.ref_name }}"
          git push origin gh-pages --force || echo "gh-pages branch creation skipped"

      - name: Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages

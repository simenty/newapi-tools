name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Tag: $TAG"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Tag must follow semver format vX.Y.Z (got: $TAG)"
            exit 1
          fi
          echo "Tag format valid."

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run Tests
        run: go test ./... -count=1 -timeout 120s

      - name: Build binaries
        run: |
          mkdir -p dist
          PLATFORMS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for PLATFORM in $PLATFORMS; do
            GOOS=${PLATFORM%/*}
            GOARCH=${PLATFORM#*/}
            EXT=""
            if [ "$GOOS" = "windows" ]; then
              EXT=".exe"
            fi
            BINARY="newapi-${GOOS}-${GOARCH}${EXT}"
            echo "Building $BINARY..."
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build -ldflags="-s -w -X github.com/simenty/newapi-tools/internal/core.Version=${GITHUB_REF_NAME#v} -X github.com/simenty/newapi-tools/internal/core.GitCommit=$(git rev-parse --short HEAD) -X github.com/simenty/newapi-tools/internal/core.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o "dist/$BINARY" ./cmd/newapi/
          done

      - name: Package archives
        run: |
          cd dist
          for FILE in newapi-linux-* newapi-darwin-*; do
            OS=$(echo $FILE | cut -d- -f2)
            ARCH=$(echo $FILE | cut -d- -f3)
            tar czf "newapi-tools_${GITHUB_REF_NAME#v}_${OS}_${ARCH}.tar.gz" "$FILE"
          done
          for FILE in newapi-windows-*; do
            OS=$(echo $FILE | cut -d- -f2)
            ARCH=$(echo $FILE | cut -d- -f3)
            zip "newapi-tools_${GITHUB_REF_NAME#v}_${OS}_${ARCH}.zip" "$FILE"
          done
          rm -f newapi-linux-* newapi-darwin-* newapi-windows-*

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate Release Notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "## 更新说明" > release_notes.md
          if [ -n "$PREV_TAG" ]; then
            echo "" >> release_notes.md
            echo "基于上一版本 $PREV_TAG 的变更：" >> release_notes.md
            echo "" >> release_notes.md

            echo "### 🚀 新功能" >> release_notes.md
            git log $PREV_TAG..HEAD --oneline --no-decorate | grep -E "^[0-9a-f]+ feat" | sed 's/^[0-9a-f]* /- /' >> release_notes.md || true
            echo "" >> release_notes.md

            echo "### 🐛 Bug 修复" >> release_notes.md
            git log $PREV_TAG..HEAD --oneline --no-decorate | grep -E "^[0-9a-f]+ fix" | sed 's/^[0-9a-f]* /- /' >> release_notes.md || true
            echo "" >> release_notes.md

            echo "### 🔧 优化与重构" >> release_notes.md
            git log $PREV_TAG..HEAD --oneline --no-decorate | grep -E "^[0-9a-f]+ (refactor|chore|docs|style|test)" | sed 's/^[0-9a-f]* /- /' >> release_notes.md || true
            echo "" >> release_notes.md

            echo "### ⚙️ CI/CD 改进" >> release_notes.md
            git log $PREV_TAG..HEAD --oneline --no-decorate | grep -E "^[0-9a-f]+ ci" | sed 's/^[0-9a-f]* /- /' >> release_notes.md || true
            echo "" >> release_notes.md

            echo "### 🛠️ 其他变更" >> release_notes.md
            git log $PREV_TAG..HEAD --oneline --no-decorate | grep -v -E "^[0-9a-f]+ (feat|fix|refactor|chore|docs|style|test|ci)" | sed 's/^[0-9a-f]* /- /' >> release_notes.md || true
            echo "" >> release_notes.md

            echo "### ⚠️ 升级注意事项" >> release_notes.md
            echo "- 建议升级前先执行 \`newapi-tools doctor\` 确认当前环境正常" >> release_notes.md
            echo "- 如需回滚，备份文件在 \`~/.config/newapi-tools/backups/\`" >> release_notes.md
            echo "" >> release_notes.md
          fi

          echo "---" >> release_notes.md
          echo "**完整变更记录**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}" >> release_notes.md
          cat release_notes.md

      - name: Create Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Creating release for version v${VERSION}..."

          # Delete existing release if it exists (for re-triggers)
          gh release delete "${GITHUB_REF_NAME}" --yes 2>/dev/null || true

          ASSETS=$(ls dist/*.tar.gz dist/*.zip dist/checksums.txt 2>/dev/null | tr '\n' ' ')
          gh release create "${GITHUB_REF_NAME}" \
            --title "v${VERSION}" \
            --notes-file release_notes.md \
            $ASSETS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
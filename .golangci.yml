run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gocyclo      # 新增：圈复杂度
    - gosec        # 新增：安全扫描

linters-settings:
  errcheck:
    check-type-assertions: false

  gocyclo:
    min-complexity: 15   # doctor.go 当前约 30+，先设宽松阈值逐步收紧

  gosec:
    # gosec: 安全扫描
    excludes:
      - G104  # Errors unhandled.

issues:
  exclude-rules:
    # Exclude test files from some linters
    - path: _test\.go
      linters:
        - errcheck
